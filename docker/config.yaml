# Verdaccio config with Entra ID auth
# Aligned with: https://verdaccio.org/docs/best — Verdaccio best practices
storage: /verdaccio/storage/data
plugins: /verdaccio/plugins

web:
  title: "@my-company Private Registry"
  favicon: ""
  gravatar: true

# Plugin reads ENTRA_CLIENT_ID, ENTRA_TENANT_ID, and ENTRA_AUTHORITY from env vars.
# Values here are fallbacks only (Verdaccio does NOT resolve ${VAR} in plugin config).
# For sovereign clouds, set ENTRA_AUTHORITY to:
#   US Government: https://login.microsoftonline.us
#   China (21Vianet): https://login.partner.microsoftonline.cn
# @see https://learn.microsoft.com/entra/identity-platform/authentication-national-cloud
auth:
  entra:
    clientId: "00001111-aaaa-2222-bbbb-3333cccc4444"
    tenantId: "aaaabbbb-0000-cccc-1111-dddd2222eeee"
    # authority: "https://login.microsoftonline.com"  # default — public cloud
    # failClosed: true  # uncomment to kill process on config error (recommended when entra is the only auth plugin)

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: true

# Best practice: order matters — packages are matched top to bottom.
# Best practice: use $authenticated on ALL access to prevent unauthenticated reads.
# Best practice: remove proxy on private packages to prevent dependency confusion.
# @see https://verdaccio.org/docs/best#strong-package-access-with-authenticated
# @see https://verdaccio.org/docs/best#remove-proxy-to-increase-security-at-private-packages
packages:
  "@my-company/*":
    access: $authenticated
    publish: $authenticated
    unpublish: $authenticated
    # No proxy — private packages never resolve to npmjs (prevents dependency confusion)

  "@*/*":
    access: $authenticated
    publish: $authenticated
    unpublish: $authenticated
    proxy: npmjs

  "**":
    access: $authenticated
    publish: $authenticated
    unpublish: $authenticated
    proxy: npmjs

server:
  keepAliveTimeout: 60

# Best practice: configure JWT expiration for both API and web tokens.
# API tokens: 7d (fintech default — shorter than Verdaccio's suggested 15d)
# Web tokens: 1h (per Verdaccio best practice — short-lived browser sessions)
# @see https://verdaccio.org/docs/best#expiring-tokens
security:
  api:
    jwt:
      sign:
        expiresIn: 7d
        notBefore: 0
  web:
    sign:
      expiresIn: 1h

# Best practice: configure rate limiting for critical endpoints.
# Defaults: 100 req / 15 min. Tightened for fintech.
# @see https://verdaccio.org/docs/best#rate-limit
userRateLimit:
  windowMs: 900000
  max: 50

middlewares:
  audit:
    enabled: true

# Note: `listen` is ignored in Docker — port is controlled by VERDACCIO_PORT env var.
# @see https://verdaccio.org/docs/docker#docker-and-custom-port-configuration

log:
  type: stdout
  format: pretty
  level: info
