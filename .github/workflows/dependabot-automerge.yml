name: Dependabot automation

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - "dependabot/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Find PR for Dependabot branch
        id: pr
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22

      - name: Locate PR
        id: locate_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PR=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --json url,number --jq '.[0]')
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "::error::No PR found for branch $HEAD_BRANCH"
            exit 1
          fi
          echo "url=$(echo "$PR" | jq -r '.url')" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR" | jq -r '.number')" >> "$GITHUB_OUTPUT"

      - name: Checkout (for production deps changeset)
        if: contains(github.event.workflow_run.head_branch, '/production-dependencies')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          persist-credentials: true

      - name: Generate changeset for production dependencies
        id: changeset
        if: contains(github.event.workflow_run.head_branch, '/production-dependencies')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          CHANGESET_FILE=".changeset/dependabot-$PR_NUMBER.md"
          if [ -f "$CHANGESET_FILE" ]; then
            echo "Changeset already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_TITLE=$(gh pr view "$PR_URL" --json title --jq '.title')

          export PR_TITLE
          envsubst '$PR_TITLE' << 'EOF' > "$CHANGESET_FILE"
          ---
          '@4pp-io/verdaccio-entra': patch
          ---

          $PR_TITLE
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git add .changeset/
          git commit -m "chore: add changeset for dependabot update"
          git push
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Approve Dependabot PR
        if: steps.changeset.outputs.created != 'true'
        env:
          PR_URL: ${{ steps.pr.outputs.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge
        if: steps.changeset.outputs.created != 'true'
        env:
          PR_URL: ${{ steps.pr.outputs.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
