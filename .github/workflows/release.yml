name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push tags, create GH releases
  pull-requests: write # create/update "Version Packages" PR
  statuses: write # set required checks on Version Packages PR
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set required statuses on Version Packages PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          PR_SHA=$(gh pr view changeset-release/main --json headRefOid --jq '.headRefOid' 2>/dev/null) || exit 0

          # Only stamp if the PR exclusively touches version/changelog files
          CHANGED=$(gh pr diff changeset-release/main --name-only 2>/dev/null) || exit 0
          while IFS= read -r file; do
            case "$file" in
              package.json|package-lock.json|CHANGELOG.md|.changeset/*) ;;
              *) echo "::error::Unexpected file in Version Packages PR: $file"; exit 1 ;;
            esac
          done <<< "$CHANGED"

          for context in build-and-test secret-scanning; do
            gh api repos/${{ github.repository }}/statuses/$PR_SHA \
              -f state=success \
              -f context="$context" \
              -f description="Skipped for Version Packages PR (version/changelog only)"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
