name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push tags, create GH releases
  pull-requests: write # create/update "Version Packages" PR
  statuses: write # set required checks on Version Packages PR
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@e87c8ed249971350e47fab7515075f44eb134e5b
        with:
          version: npm run version-packages
          publish: npm run release
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set required statuses on Version Packages PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          # Use GH_TOKEN for authenticated API calls
          PR_SHA=$(gh pr view changeset-release/main --json headRefOid --jq '.headRefOid' 2>/dev/null) || exit 0

          # Strict check: Only stamp if the PR exclusively touches version/changelog files
          # This prevents malicious scripts in package.json from sneaking in
          CHANGED=$(gh pr diff changeset-release/main --name-only 2>/dev/null) || exit 0
          while IFS= read -r file; do
            case "$file" in
              package.json|package-lock.json|CHANGELOG.md|.changeset/*) ;;
              *) echo "::error::Unexpected file in Version Packages PR: $file"; exit 1 ;;
            esac
          done <<< "$CHANGED"

          # Use environment variables for API calls
          for context in build-and-test secret-scanning; do
            gh api "/repos/$GITHUB_REPOSITORY/statuses/${PR_SHA}" \
              -f state=success \
              -f context="$context" \
              -f description="Skipped for Version Packages PR (version/changelog only)"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
