name: Dependabot Changesets

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Create changeset for production dependency updates
        if: steps.metadata.outputs.dependency-type == 'direct:production'
        run: |
          # Determine changeset type from Dependabot's update-type
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          case "$UPDATE_TYPE" in
            *semver-major)  CHANGESET_TYPE="major" ;;
            *semver-minor)  CHANGESET_TYPE="minor" ;;
            *)              CHANGESET_TYPE="patch" ;;
          esac

          # Get dependency names
          DEP_NAMES="${{ steps.metadata.outputs.dependency-names }}"

          # Create changeset file
          cat > .changeset/dependabot-${{ github.event.pull_request.number }}.md << EOF
          ---
          '@4pp-io/verdaccio-entra': $CHANGESET_TYPE
          ---

          Bump $DEP_NAMES

          Auto-generated changeset for production dependency update.
          EOF

          # Commit the changeset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git commit -m "chore: add changeset for dependabot update"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
