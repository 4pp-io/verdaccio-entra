name: Dependabot Changesets

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Required for mscharley/dependency-changesets-action to see the PR commit history
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Add changeset
        uses: mscharley/dependency-changesets-action@v1.2.3
        with:
          # GitHub Actions normally restricts the default GITHUB_TOKEN on `pull_request` events
          # from forks/Dependabot. Using `pull_request_target` solves this, but we MUST ensure
          # we only run this workflow when the actor is actually Dependabot to prevent pwn requests.
          token: ${{ secrets.GITHUB_TOKEN }}
          use-conventional-commits: true
          # Note: If Dependabot is configured to rebase PRs automatically, the changeset will be
          # preserved. However, if the commit is pushed back to the branch by GITHUB_TOKEN,
          # no further GitHub Actions will trigger (to prevent recursive loops).
          # For full CI execution on the changeset commit, a PAT (Personal Access Token) is recommended.
