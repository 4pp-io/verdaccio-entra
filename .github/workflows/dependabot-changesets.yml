name: Dependabot Changesets

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check if production dependency
        id: check-prod
        run: |
          # Compare dependencies (not devDependencies) between base and head
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD -- package.json \
            | grep -E '^\+.*"(dependencies)"' -A 100 \
            | grep -E '^\+' | head -20 > /tmp/dep-diff.txt || true

          # Simpler: check if the PR title mentions a production dep
          PROD_DEPS=$(node -e "
            const pkg = require('./package.json');
            console.log(Object.keys(pkg.dependencies || {}).join('|'));
          ")
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qE "($PROD_DEPS)"; then
            echo "is_prod=true" >> "$GITHUB_OUTPUT"
            echo "Production dependency update detected: $TITLE"
          else
            echo "is_prod=false" >> "$GITHUB_OUTPUT"
            echo "devDependency update — skipping changeset: $TITLE"
          fi

      - name: Add changeset
        if: steps.check-prod.outputs.is_prod == 'true'
        uses: mscharley/dependency-changesets-action@v1.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          use-conventional-commits: true
